{% extends "base.html" %}

{% block title %}Home | Calorie Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-lg-10">
		<div class="card border-0 overflow-hidden">
			<div class="card-body p-4 p-md-5">
				<h1 class="section-title mb-3">Track Calories. Hit Goals. Stay Consistent.</h1>
				<p class="sub-title mb-4">A focused tracker for daily nutrition with quick logging and clear progress views.</p>
				<div class="d-flex flex-wrap gap-2">
					<a class="btn btn-primary" href="{% url 'register' %}">Create Account</a>
					<a class="btn btn-outline-primary" href="{% url 'login' %}">Login</a>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
