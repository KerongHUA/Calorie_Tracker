<!DOCTYPE html>
<html>
<head>
    <title>Calorie Tracker</title>
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a> |

    {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">Profile</a> |
        <a href="{% url 'goals' %}">Daily Goals</a> |
        <a href="{% url 'food_list' %}">Foods</a> |
        <a href="{% url 'add_custom_food' %}">Add Custom Food</a> |
        <a href="{% url 'intake_list' %}">My Intake</a> |
        <a href="{% url 'add_intake' %}">Add Intake</a> |
        <a href="{% url 'intake_history' %}">History</a> |
        <span>Hello, {{ user.username }}</span> |
        <a href="{% url 'logout' %}">Logout</a>
    {% else %}
        <a href="{% url 'register' %}">Register</a> |
        <a href="{% url 'login' %}">Login</a>
    {% endif %}
</nav>

<hr>

{% block content %}
{% endblock %}

</body>
</html>
